<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui"
    />
    <title>曼巴烧烤</title>
    <link rel="icon" type="image/png" href="./../images/favicon.png?v=20260517-logo3" />
    <script src="./../js/base.js?v=20260507-frontfix5"></script>
    <link rel="stylesheet" href="../../backend/plugins/element-ui/index.css?v=20260507-frontfix5" />
    <link rel="stylesheet" href="../styles/vant.min.css?v=20260507-frontfix5" />
    <link rel="stylesheet" href="../styles/index.css?v=20260507-frontfix5" />
    <link rel="stylesheet" href="./../styles/login.css?v=20260507-frontfix5" />
  </head>
  <body>
    <div id="login" v-loading="loading">
      <div class="divHead">登录</div>
      <div class="divContainer">
        <el-input
          placeholder="请输入邮箱"
          v-model.trim="form.email"
          maxlength="64"
        ></el-input>
        <div class="divSplit"></div>
        <el-input
          placeholder="请输入验证码"
          v-model.trim="form.code"
          maxlength="6"
        ></el-input>
        <span :class="{ disabled: codeLoading }" @click="getCode">
          {{ codeLoading ? "发送中..." : "获取验证码" }}
        </span>
      </div>
      <div class="divMsg" v-if="msgFlag">邮箱格式不正确，请重新输入</div>
      <el-button
        type="primary"
        :class="{ btnSubmit: true, btnNoEmail: !form.email, btnEmail: !!form.email }"
        @click="btnLogin"
      >
        登录
      </el-button>
    </div>

    <script src="../../backend/plugins/vue/vue.js?v=20260507-frontfix5"></script>
    <script src="../../backend/plugins/element-ui/index.js?v=20260507-frontfix5"></script>
    <script src="./../js/vant.min.js?v=20260507-frontfix5"></script>
    <script src="../../backend/plugins/axios/axios.min.js?v=20260507-frontfix5"></script>
    <script src="./../js/request.js?v=20260507-frontfix5"></script>
    <script src="./../api/login.js?v=20260507-frontfix5"></script>
    <script>
      const PAGE_VERSION = "20260507-frontfix5";

      new Vue({
        el: "#login",
        data() {
          return {
            form: {
              email: "",
              code: "",
            },
            msgFlag: false,
            loading: false,
            codeLoading: false,
          };
        },
        methods: {
          isSuccess(res) {
            return (
              !!res &&
              (res.code === 1 ||
                res.code === "1" ||
                res.msg === "验证码发送成功" ||
                res.data === "验证码发送成功")
            );
          },
          checkEmail() {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            this.msgFlag = !regex.test(this.form.email);
            return !this.msgFlag;
          },
          async getCode() {
            if (this.codeLoading) {
              return;
            }
            this.form.code = "";
            if (!this.checkEmail()) {
              return;
            }

            this.codeLoading = true;
            try {
              const res = await sendEmailCodeApi({ email: this.form.email });
              if (this.isSuccess(res)) {
                this.$notify({ type: "success", message: "验证码已发送，请查看邮箱" });
                return;
              }
              console.warn("sendMsg response:", res);
            } catch (error) {
              console.warn("sendMsg request error:", error);
            } finally {
              this.codeLoading = false;
            }
          },
          async btnLogin() {
            if (!(this.form.email && this.form.code && this.checkEmail())) {
              this.$notify({ type: "warning", message: "请输入邮箱和验证码" });
              return;
            }

            this.loading = true;
            try {
              const res = await loginApi({
                email: this.form.email,
                code: this.form.code,
              });
              if (res && (res.code === 1 || res.code === "1")) {
                sessionStorage.setItem("userEmail", this.form.email);
                window.requestAnimationFrame(() => {
                  window.location.href = "/front/index.html?v=" + PAGE_VERSION;
                });
                return;
              }
              this.$notify({
                type: "warning",
                message: (res && res.msg) || "登录失败",
              });
            } catch (error) {
              const message =
                error &&
                error.response &&
                error.response.data &&
                error.response.data.msg
                  ? error.response.data.msg
                  : "登录失败，请检查后端服务";
              this.$notify({ type: "warning", message: message });
            } finally {
              this.loading = false;
            }
          },
        },
      });
    </script>
  </body>
</html>
