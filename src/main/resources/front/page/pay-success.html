<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui"
    />
    <title>菩提阁</title>
    <link rel="icon" href="./../images/favico.ico" />
    <script src="./../js/base.js?v=20260506-fixall1"></script>
    <link rel="stylesheet" href="../../backend/plugins/element-ui/index.css?v=20260506-fixall1" />
    <link rel="stylesheet" href="../styles/index.css?v=20260506-fixall1" />
    <link rel="stylesheet" href="./../styles/pay-success.css" />
  </head>
  <body>
    <div id="pay_success" class="app">
      <div class="divHead">
        <div class="divTitle">
          <i class="el-icon-arrow-left" @click="goBack"></i>
          支付成功
          <img src="./../images/home.png" @click="toMainPage" />
        </div>
      </div>
      <div class="divContent">
        <img src="./../images/success.png" />
        <div class="divSuccess">下单成功</div>
        <div class="divDesc">预计{{ finishTime }}送达</div>
        <div class="divDesc1">后厨正在加紧制作中，请耐心等待~</div>
        <div class="btnView" @click="toOrderPage">查看订单</div>
      </div>
    </div>

    <script src="../../backend/plugins/vue/vue.js?v=20260506-fixall1"></script>
    <script src="../../backend/plugins/element-ui/index.js?v=20260506-fixall1"></script>
    <script src="../../backend/plugins/axios/axios.min.js?v=20260506-fixall1"></script>
    <script src="./../js/request.js?v=20260506-fixall1"></script>
    <script>
      const PAGE_VERSION = "20260506-fixall1";

      new Vue({
        el: "#pay_success",
        data() {
          return {
            finishTime: "",
          };
        },
        created() {
          this.getFinishTime();
        },
        methods: {
          goBack() {
            window.requestAnimationFrame(() => {
              window.location.replace("/front/index.html?v=" + PAGE_VERSION);
            });
          },
          toOrderPage() {
            window.requestAnimationFrame(() => {
              window.location.replace("/front/page/order.html?v=" + PAGE_VERSION);
            });
          },
          toMainPage() {
            window.requestAnimationFrame(() => {
              window.location.replace("/front/index.html?v=" + PAGE_VERSION);
            });
          },
          getFinishTime() {
            const now = new Date();
            let hour = now.getHours() + 1;
            let minute = now.getMinutes();
            if (hour.toString().length < 2) {
              hour = "0" + hour;
            }
            if (minute.toString().length < 2) {
              minute = "0" + minute;
            }
            this.finishTime = hour + ":" + minute;
          },
        },
      });
    </script>
  </body>
</html>
