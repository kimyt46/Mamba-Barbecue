<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui"
    />
    <title>菩提阁</title>
    <link rel="icon" href="./../images/favico.ico" />
    <script src="./../js/base.js?v=20260507-frontfix3"></script>
    <link rel="stylesheet" href="../../backend/plugins/element-ui/index.css?v=20260507-frontfix3" />
    <link rel="stylesheet" href="../styles/index.css?v=20260507-frontfix3" />
    <link rel="stylesheet" href="../styles/vant.min.css?v=20260507-frontfix3" />
    <link rel="stylesheet" href="./../styles/order.css" />
  </head>
  <body>
    <div id="order" class="app">
      <div class="divHead">
        <div class="divTitle">
          <i class="el-icon-arrow-left" @click="goBack"></i>历史订单
        </div>
      </div>
      <div class="divBody" v-if="orderList.length > 0">
        <van-list
          v-model="loading"
          :finished="finished"
          finished-text="没有更多了"
          @load="getList"
        >
          <van-cell v-for="(order,index) in orderList" :key="index" class="item">
            <div class="timeStatus">
              <span>{{ order.orderTime }}</span>
              <span>{{ getStatus(order.status) }}</span>
            </div>
            <div class="dishList">
              <div v-for="(item,dishIndex) in order.orderDetails" :key="dishIndex" class="item">
                <span>{{ item.name }}</span>
                <span>x{{ item.number }}</span>
              </div>
            </div>
            <div class="result">
              <span>共{{ order.sumNum }} 件商品，实付</span><span class="price">￥{{ order.amount }}</span>
            </div>
            <div class="btn" v-if="String(order.status) === '4'">
              <div class="btnAgain" @click="addOrderAgain(order)">再来一单</div>
            </div>
          </van-cell>
        </van-list>
      </div>
      <div class="divNoData" v-else>
        <div class="divContainer">
          <img src="./../images/no_order.png" />
          <div>暂无订单</div>
        </div>
      </div>
    </div>

    <script src="../../backend/plugins/vue/vue.js?v=20260507-frontfix3"></script>
    <script src="../../backend/plugins/element-ui/index.js?v=20260507-frontfix3"></script>
    <script src="./../js/vant.min.js?v=20260507-frontfix3"></script>
    <script src="../../backend/plugins/axios/axios.min.js?v=20260507-frontfix3"></script>
    <script src="./../js/request.js?v=20260507-frontfix3"></script>
    <script src="./../api/order.js?v=20260507-frontfix3"></script>
    <script>
      const PAGE_VERSION = "20260507-frontfix3";

      new Vue({
        el: "#order",
        data() {
          return {
            paging: {
              page: 1,
              pageSize: 5,
            },
            orderList: [],
            loading: false,
            finished: false,
          };
        },
        created() {
          this.initData();
        },
        methods: {
          isSuccess(res) {
            return !!res && (res.code === 1 || res.code === "1");
          },
          goBack() {
            const url = document.referrer || "";
            if (url.includes("success")) {
              window.requestAnimationFrame(() => {
                window.location.href = "/front/index.html?v=" + PAGE_VERSION;
              });
              return;
            }
            history.go(-1);
          },
          initData() {
            this.getList();
          },
          async getList() {
            if (this.finished) {
              this.loading = false;
              return;
            }
            try {
              const res = await orderPagingApi(this.paging);
              if (this.isSuccess(res)) {
                const records = (res.data && res.data.records) || [];
                records.forEach((item) => {
                  let number = 0;
                  (item.orderDetails || []).forEach((ele) => {
                    number += ele.number;
                  });
                  item.sumNum = number;
                });
                this.orderList.push(...records);
                this.loading = false;
                if (!res.data || this.paging.page >= res.data.pages) {
                  this.finished = true;
                }
                this.paging.page += 1;
                return;
              }
              this.loading = false;
              this.finished = true;
              this.$notify({ type: "warning", message: res.msg || "获取订单失败" });
            } catch (error) {
              this.loading = false;
              this.finished = true;
            }
          },
          async addOrderAgain(order) {
            try {
              const res = await orderAgainApi({ id: order.id });
              if (this.isSuccess(res)) {
                window.requestAnimationFrame(() => {
                  window.location.href = "/front/index.html?v=" + PAGE_VERSION;
                });
                return;
              }
              this.$notify({ type: "warning", message: res.msg || "操作失败" });
            } catch (error) {}
          },
          getStatus(status) {
            switch (String(status)) {
              case "1":
                return "待付款";
              case "2":
                return "正在派送";
              case "3":
                return "已派送";
              case "4":
                return "已完成";
              case "5":
                return "已取消";
              default:
                return "";
            }
          },
        },
      });
    </script>
  </body>
</html>
