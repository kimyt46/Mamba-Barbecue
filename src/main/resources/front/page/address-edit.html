<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui"
    />
    <title>曼巴烧烤</title>
    <link rel="icon" type="image/png" href="./../images/favicon.png?v=20260517-logo3" />
    <script src="./../js/base.js?v=20260507-frontfix3"></script>
    <link rel="stylesheet" href="../../backend/plugins/element-ui/index.css?v=20260507-frontfix3" />
    <link rel="stylesheet" href="../styles/vant.min.css?v=20260507-frontfix3" />
    <link rel="stylesheet" href="../styles/index.css?v=20260507-frontfix3" />
    <link rel="stylesheet" href="./../styles/address-edit.css" />
  </head>
  <body>
    <div id="address_edit" class="app">
      <div class="divHead">
        <div class="divTitle">
          <i class="el-icon-arrow-left" @click="goBack"></i>{{ title }}
        </div>
      </div>
      <div class="divContent">
        <div class="divItem">
          <span>联系人：</span>
          <el-input
            placeholder="请输入收货人姓名"
            v-model="form.consignee"
            maxlength="10"
            class="inputUser"
          ></el-input>
          <span class="spanChecked" @click="form.sex = '1'">
            <i :class="{ iActive: form.sex === '1' }"></i>
            先生
          </span>
          <span class="spanChecked" @click="form.sex = '0'">
            <i :class="{ iActive: form.sex === '0' }"></i>
            女士
          </span>
        </div>
        <div class="divItem">
          <span>手机号：</span>
          <el-input
            placeholder="请输入收货人手机号"
            v-model="form.phone"
            maxlength="20"
            style="width: calc(100% - 80rem);"
          ></el-input>
        </div>
        <div class="divItem">
          <span>收货地址：</span>
          <el-input
            placeholder="请输入收货地址"
            v-model="form.detail"
            maxlength="140"
          ></el-input>
        </div>
        <div class="divItem">
          <span>标签：</span>
          <span
            v-for="(item,index) in labelList"
            :key="index"
            @click="selectLabel(item, index)"
            :class="{ spanItem: true, spanActiveSchool: activeIndex === index }"
          >{{ item }}</span>
        </div>
        <div class="divSave" @click="saveAddress">保存地址</div>
        <div class="divDelete" @click="deleteAddress" v-if="id">删除地址</div>
      </div>
    </div>

    <script src="../../backend/plugins/vue/vue.js?v=20260507-frontfix3"></script>
    <script src="../../backend/plugins/element-ui/index.js?v=20260507-frontfix3"></script>
    <script src="./../js/vant.min.js?v=20260507-frontfix3"></script>
    <script src="./../js/common.js?v=20260507-frontfix3"></script>
    <script src="./../api/address.js?v=20260507-frontfix3"></script>
    <script src="../../backend/plugins/axios/axios.min.js?v=20260507-frontfix3"></script>
    <script src="./../js/request.js?v=20260507-frontfix3"></script>
    <script>
      const PAGE_VERSION = "20260507-frontfix3";

      new Vue({
        el: "#address_edit",
        data() {
          return {
            title: "新增收货地址",
            form: {
              consignee: "",
              phone: "",
              sex: "1",
              detail: "",
              label: "公司",
            },
            labelList: ["无", "公司", "家", "学校"],
            id: undefined,
            activeIndex: 1,
          };
        },
        created() {
          this.initData();
        },
        methods: {
          isSuccess(res) {
            return !!res && (res.code === 1 || res.code === "1");
          },
          goBack() {
            history.go(-1);
          },
          selectLabel(item, index) {
            this.form.label = item;
            this.activeIndex = index;
          },
          syncActiveLabel(label) {
            const index = this.labelList.indexOf(label || "无");
            this.activeIndex = index > -1 ? index : 0;
          },
          async initData() {
            const params = parseUrl(window.location.search);
            this.id = params.id;
            if (!params.id) {
              this.syncActiveLabel(this.form.label);
              return;
            }
            this.title = "编辑收货地址";
            try {
              const res = await addressFindOneApi(params.id);
              if (this.isSuccess(res)) {
                this.form = Object.assign(
                  {
                    consignee: "",
                    phone: "",
                    sex: "1",
                    detail: "",
                    label: "无",
                  },
                  res.data || {}
                );
                this.syncActiveLabel(this.form.label);
                return;
              }
              this.$notify({ type: "warning", message: res.msg || "地址获取失败" });
            } catch (error) {}
          },
          async saveAddress() {
            const form = this.form;
            if (!form.consignee) {
              this.$notify({ type: "warning", message: "请输入联系人" });
              return;
            }
            if (!form.phone) {
              this.$notify({ type: "warning", message: "请输入手机号" });
              return;
            }
            if (!form.detail) {
              this.$notify({ type: "warning", message: "请输入收货地址" });
              return;
            }

            const reg = /^1[3-9][0-9]{9}$/;
            if (!reg.test(form.phone)) {
              this.$notify({ type: "warning", message: "手机号格式不正确" });
              return;
            }

            try {
              const res = this.id
                ? await updateAddressApi(this.form)
                : await addAddressApi(this.form);
              if (this.isSuccess(res)) {
                window.requestAnimationFrame(() => {
                  window.location.replace("/front/page/address.html?v=" + PAGE_VERSION);
                });
                return;
              }
              this.$notify({ type: "warning", message: res.msg || "保存地址失败" });
            } catch (error) {}
          },
          deleteAddress() {
            this.$dialog
              .confirm({
                title: "确认删除",
                message: "确认要删除当前地址吗？",
              })
              .then(async () => {
                try {
                  const res = await deleteAddressApi({ ids: this.id });
                  if (this.isSuccess(res)) {
                    window.requestAnimationFrame(() => {
                      window.location.replace("/front/page/address.html?v=" + PAGE_VERSION);
                    });
                    return;
                  }
                  this.$notify({ type: "warning", message: res.msg || "删除地址失败" });
                } catch (error) {}
              })
              .catch(() => {});
          },
        },
      });
    </script>
  </body>
</html>
