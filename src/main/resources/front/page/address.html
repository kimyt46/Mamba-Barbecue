    <body>
        <div id="address" class="app">
            <div class="divHead">
                <div class="divTitle">
                    <i class="el-icon-arrow-left" @click="goBack"></i>鍦板潃绠＄悊
                </div>
            </div>
            <div class="divContent">
                <div class="divItem" v-for="(item,index) in addressList" :key="index" @click.capture="itemClick(item)">
                    <div class="divAddress">
                        <span :class="{spanCompany:item.label === '鍏徃',spanHome:item.label === '瀹?,spanSchool:item.label === '瀛︽牎'}">{{item.label}}</span>
                        {{item.detail}}
                    </div>
                    <div class="divUserPhone">
                        <span>{{item.consignee}}</span>
                        <span>{{item.sex === '0' ? '濂冲＋' : '鍏堢敓'}}</span>
                        <span>{{item.phone}}</span>
                    </div>
                    <img src="./../images/edit.png" @click.stop.prevent="toAddressEditPage(item)"/>
                    <div class="divSplit"></div>
                    <div class="divDefault" >
                        <img src="./../images/checked_true.png" v-if="item.isDefault === 1">
                        <img src="./../images/checked_false.png" @click.stop.prevent="setDefaultAddress(item)" v-else>璁句负榛樿鍦板潃
                    </div>
                </div>
            </div>
            <div class="divBottom" @click="toAddressCreatePage">+ 娣诲姞鏀惰揣鍦板潃</div>
        </div>

            <script src="./../api/address.js"></script>
            <!-- 寮曞叆axios -->
            <script src="../../backend/plugins/axios/axios.min.js"></script>
            <script src="./../js/request.js"></script>

                    ],

                },
                computed:{},
                created(){
                    this.initData()
                },
                mounted(){},
                methods:{
                    goBack(){
                        history.go(-1)
                    },
                    toAddressEditPage(item){
                        window.requestAnimationFrame(()=>{
                            window.location.href= `/front/page/address-edit.html?id=${item.id}`
                        })
                    },
                    toAddressCreatePage(){
                        window.requestAnimationFrame(()=>{
                            window.location.href= '/front/page/address-edit.html'
                        })
                    },
                    async initData(){
                        const res = await addressListApi()
                        if(res.code === 1){
                            this.addressList = res.data
                        }else{
                            this.$message.error(res.msg)
                        }
                    },
                    async setDefaultAddress(item){
                        if(item.id){
                            const res = await setDefaultAddressApi({id:item.id})
                            if(res.code === 1){
                            this.initData()
                            }else{
                                this.$message.error(res.msg)
                            }
                        }
                    },
                    itemClick(item){
                        const url = document.referrer
                        //琛ㄧず鏄粠璁㈠崟椤甸潰璺宠浆杩囨潵鐨?
                        if(url.includes('order')){
                            this.setDefaultAddress(item)
                            history.go(-1)
                        }
                    }

                }
