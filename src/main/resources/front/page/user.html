<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0,user-scalable=no,minimal-ui">
    <title>KT猫后台系统</title>
    <link rel="icon" href="./../images/favico.ico">
    <!--element-ui鐨勬牱寮?->
    <link rel="stylesheet" href="../../backend/plugins/element-ui/index.css" />
    <!-- 寮曞叆鏍峰紡  -->
    <link rel="stylesheet" href="../styles/index.css" />
    <!--寮曞叆vant鏍峰紡-->
    <link rel="stylesheet" href="../styles/vant.min.css"/>
    <!--鏈〉闈㈠唴瀹圭殑鏍峰紡-->
    <link rel="stylesheet" href="./../styles/user.css" />
</head>
<body>
    <div id="user" class="app">
        <div class="divHead">
            <div class="divTitle">
                <i class="el-icon-arrow-left" @click="goBack"></i>涓汉涓績
            </div>
            <div class="divUser">
                <img src="./../images/headPage.png"/>
                <div class="desc">
                    <div class="divName">鏋椾箣杩?<img src="./../images/women.png"/></div>
                    <div class="divPhone">{{userPhone}}</div>
                </div>
            </div>
        </div>
        <div class="divContent">
            <div class="divLinks">
                <div class="item" @click="toAddressPage">
                    <img src="./../images/locations.png"/>
                    <span>鍦板潃绠＄悊</span>
                    <i class="el-icon-arrow-right"></i>
                </div>
                <div class="divSplit"></div>
                <div class="item" @click="toOrderPage">
                    <img src="./../images/orders.png"/>
                    <span>鍘嗗彶璁㈠崟</span>
                    <i class="el-icon-arrow-right"></i>
                </div>
            </div>
            <div class="divOrders" v-if="order[0]">
                <div class="title">鏈€鏂拌鍗</div>
                <div class="timeStatus">
                    <span>{{order[0].orderTime}}</span>
                    <span>{{getStatus(order[0].status)}}</span>
                    <!-- <span>姝ｅ湪娲鹃€</span> -->
                </div>
                <div class="dishList">
                    <div v-for="(item,index) in order[0].orderDetails" :key="index" class="item">
                        <span>{{item.name}}</span>
                        <span>x{{item.number}}</span>
                    </div>
                </div>
                <div class="result">
                    <span>鍏眥{order[0].sumNum}} 浠跺晢鍝?瀹炰粯</span>
                    <span class="price">锟{order[0].amount}}</span>
                </div>
                <div class="btn" v-if="order[0].status === 4">
                    <div class="btnAgain" @click="addOrderAgain">鍐嶆潵涓€鍗</div>
                </div>
            </div>
            <div class="quitLogin" @click="toPageLogin">
                閫€鍑虹櫥褰?
            </div>
        </div>
    </div>
    <!-- 寮€鍙戠幆澧冪増鏈紝鍖呭惈浜嗘湁甯姪鐨勫懡浠よ璀﹀憡 -->
    <script src="../../backend/plugins/vue/vue.js"></script>
    <!-- 寮曞叆缁勪欢搴?-->
    <script src="../../backend/plugins/element-ui/index.js"></script>
    <!-- 寮曞叆vant缁勪欢 -->
    <script src="./../js/vant.min.js"></script>    
    <!--涓嶅悓灞忓箷灏哄鏍瑰瓧浣撹缃?->
    <script src="./../js/base.js"></script>
    <!-- 寮曞叆axios -->
    <script src="../../backend/plugins/axios/axios.min.js"></script>
    <script src="./../js/request.js"></script>
    <script src="./../api/order.js"></script>
    <script src="./../api/login.js"></script>
    <script>
        new Vue({
            el:"#user",
            data(){
                return {
                    form:{
                        phone:'',
                        code:''
                    },
                    msgFlag:false,
                    order:[{
                        orderTime:'',//涓嬪崟鏃堕棿
                        status:undefined,//璁㈠崟鐘舵€?1宸茬粨璐︼紝2鏈粨璐︼紝3宸查€€鍗曪紝4宸插畬鎴愶紝5宸插彇娑?
                        orderDetails:[{
                            name:'',//鑿滃搧鍚嶇О
                            number:undefined,//鏁伴噺
                        }],//鏄庣粏
                        amount:undefined,//瀹炴敹閲戦
                        sumNum:0,//鑿滃搧鎬绘暟
                    }],
                }
            },
            computed:{},
            created(){
                this.userPhone =sessionStorage.getItem("userPhone")
                this.initData()
            },
            mounted(){},
            methods:{
                goBack(){
                    history.go(-1)
                },
                toAddressPage(){
                    window.requestAnimationFrame(()=>{
                        window.location.href = '/front/page/address.html'
                    })  
                },
                toOrderPage(){
                    window.requestAnimationFrame(()=>{
                        window.location.href = '/front/page/order.html'
                    }) 
                },
                initData(){
                    this.getLatestOrder()
                },
                async getLatestOrder(){
                    const params = {
                        page:1,
                        pageSize:1
                    }
                    const res = await orderPagingApi(params)
                    if(res.code === 1){
                        this.order = res.data.records
                        if(this.order && this.order[0].orderDetails){
                            let number = 0
                            this.order[0].orderDetails.forEach(item=>{
                                number += item.number
                            })
                            this.order[0].sumNum = number
                        }
                    }else{
                        this.$notify({ type:'warning', message:res.msg});
                    }
                },
                getStatus(status){
                    let str = ''
                    switch(status){
                        case 1:
                            str =  '待付款'
                        break;
                        case 2:
                            str =  '正在派送'
                        break;
                        case 3:
                            str =  '已派送'
                        break;
                        case 4:
                            str =  '已完成'
                        break;
                        case 5:
                            str =  '已取消'
                        break;

                    }
                    return str
                },
                async addOrderAgain(){
                    const res = await orderAgainApi({id:this.order[0].id})
                    if(res.code === 1){
                        window.requestAnimationFrame(()=>{
                            window.location.href = '/front/index.html'
                        }) 
                    }else{
                        this.$notify({ type:'warning', message:res.msg});
                    }
                },
                async toPageLogin(){
                    const res = await loginoutApi()
                    if(res.code === 1){
                        window.requestAnimationFrame(()=>{
                            window.location.href = '/front/page/login.html'
                        }) 
                    }else{
                        this.$notify({ type:'warning', message:res.msg});
                    }                
                }
            }
        })
    </script>
</body>
</html>
