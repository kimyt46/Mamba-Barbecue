<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>瑞吉外卖管理端</title>
    <link rel="shortcut icon" type="image/png" href="favicon.png?v=20260517-logo3">
    <!-- 引入样式 -->
    <link rel="stylesheet" href="plugins/element-ui/index.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/index.css" />
    <link rel="stylesheet" href="styles/icon/iconfont.css" />
    <style>
      .body{
        min-width: 1366px;
      }
      .app-main{
        height: calc(100% - 64px);
      }
      .app-main .divTmp{
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div class="app" id="app">
      <div class="app-wrapper openSidebar clearfix">
        <!-- sidebar -->
        <div class="sidebar-container">
          <div class="logo">
            <!-- <img src="images/logo.png" width="122.5" alt="" /> -->
            <img src="images/login/login-logo.png?v=20260517-logo5" alt="" style="width: 132px; height: auto; display: block; margin: 0 auto;" />
          </div>

          <el-scrollbar wrap-class="scrollbar-wrapper">
            <el-menu
              :default-active="defAct"
              :unique-opened="false"
              :collapse-transition="false"
              background-color="#343744"
              text-color="#bfcbd9"
              active-text-color="#f4f4f5"
            >
              <div v-for="item in menuList" :key="item.id">
                <el-submenu :index="item.id" v-if="item.children && item.children.length>0">
                  <template slot="title">
                    <i class="iconfont" :class="item.icon"></i>
                    <span>{{item.name}}</span>
                  </template>
                  <el-menu-item
                    v-for="sub in item.children"
                    :index="sub.id"
                    :key="sub.id"
                    @click="menuHandle(sub,false)"
                    >
                    <i :class="iconfont" :class="sub.icon"></i>
                    <span slot="title">{{sub.name}}</span>
                    </el-menu-item
                  >
                </el-submenu>
                <el-menu-item v-else :index="item.id" @click="menuHandle(item,false)">
                  <i class="iconfont" :class="item.icon"></i>
                  <span slot="title">{{item.name}}</span>
                </el-menu-item>
              </div>
            </el-menu>
          </el-scrollbar>
        </div>
        <div class="main-container">
          <!-- <navbar /> -->
          <div class="navbar">
            <div class="head-lable">
              <span v-if="goBackFlag" class="goBack" @click="goBack()"
                ><img src="images/icons/btn_back@2x.png" alt="" /> 返回</span
              >
              <span>{{headTitle}}</span>
            </div>
            <div class="right-menu">
              <div class="avatar-wrapper">{{ userInfo.name }}</div>
              <!-- <div class="logout" @click="logout">退出</div> -->
              <img src="images/icons/btn_close@2x.png" class="outLogin" alt="退出" @click="logout" />
            </div>
          </div>
          <div class="app-main" v-loading="loading">
            <div class="divTmp" v-show="loading"></div>
            <iframe
              id="cIframe"
              class="c_iframe"
              name="cIframe"
              :src="iframeUrl"
              width="100%"
              height="auto"
              frameborder="0"
              v-show="!loading"
            ></iframe>
          </div>
        </div>
      </div>
    </div>
    <!-- 开发环境版本，包含了有帮助的命令行警告 -->
    <script src="plugins/vue/vue.js"></script>
    <!-- 引入组件库 -->
    <script src="plugins/element-ui/index.js"></script>
    <!-- 引入axios -->
    <script src="plugins/axios/axios.min.js"></script>
    <script src="js/request.js"></script>
    <script src="./api/login.js"></script>
    <script>
      const BACKEND_PAGE_VERSION = '20260507-backfix2'
      const withVersion = (url) => {
        if (!url) {
          return url
        }
        return url.includes('?')
          ? `${url}&v=${BACKEND_PAGE_VERSION}`
          : `${url}?v=${BACKEND_PAGE_VERSION}`
      }

      const DEFAULT_MENU = {
        id: '2',
        url: 'page/member/list.html',
        name: '员工管理'
      }
      const BACKEND_PAGE_STATE_KEY = 'backendPageState'
      const BACKEND_LOGIN_ENTRY_KEY = 'backendLoginEntry'

      new Vue({
        el: '#app',
        data() {
          return {
            defAct: '2',
            menuActived: '2',
            userInfo: {},
            menuList: [
              // {
              //   id: '1',
              //   name: '门店管理',
              //   children: [
                  {
                    id: '2',
                    name: '员工管理',
                    url: 'page/member/list.html',
                    icon: 'icon-member'
                  },
                  {
                    id: '3',
                    name: '分类管理',
                    url: 'page/category/list.html',
                    icon: 'icon-category'
                  },
                  {
                    id: '4',
                    name: '菜品管理',
                    url: 'page/food/list.html',
                    icon: 'icon-food'
                  },
                  {
                    id: '5',
                    name: '套餐管理',
                    url: 'page/combo/list.html',
                    icon: 'icon-combo'
                  },
                  {
                    id: '6',
                    name: '订单明细',
                    url: 'page/order/list.html',
                    icon: 'icon-order'
                  }
              //   ],
              // },
            ],
            iframeUrl: withVersion(DEFAULT_MENU.url),
            headTitle: '员工管理',
            goBackFlag: false,
            loading: true,
            timer: null
          }
        },
        computed: {},
        created() {
          const userInfo = window.localStorage.getItem('userInfo')
          if (userInfo) {
            this.userInfo = JSON.parse(userInfo)
          }
          this.restorePageState()
          this.closeLoading()
        },
        beforeDestroy() {
          this.timer = null
          clearTimeout(this.timer)
        },
        mounted() {
          window.menuHandle = this.menuHandle
        },
        methods: {
          logout() {
            logoutApi().then((res)=>{
              if(res.code === 1){
                localStorage.removeItem('userInfo')
                localStorage.removeItem(BACKEND_PAGE_STATE_KEY)
                sessionStorage.removeItem(BACKEND_LOGIN_ENTRY_KEY)
                window.location.href = '/backend/page/login/login.html'
              }
            })
          },
          goBack() {
            // window.location.href = 'javascript:history.go(-1)'
            const menu = this.menuList.find(item=>item.id===this.menuActived)
            // this.goBackFlag = false
            // this.headTitle = menu.name
            this.menuHandle(menu,false)
          },
          menuHandle(item, goBackFlag) {
            this.loading = true
            this.menuActived = item.id
            this.defAct = item.id
            this.iframeUrl = withVersion(item.url)
            this.headTitle = item.name
            this.goBackFlag = goBackFlag
            this.persistPageState(item, goBackFlag)
            this.closeLoading()
          },
          getDefaultMenu() {
            return this.menuList.find(item => item.id === DEFAULT_MENU.id) || DEFAULT_MENU
          },
          restorePageState() {
            const loginEntry = sessionStorage.getItem(BACKEND_LOGIN_ENTRY_KEY)
            sessionStorage.removeItem(BACKEND_LOGIN_ENTRY_KEY)
            if (loginEntry === '1') {
              const defaultMenu = this.getDefaultMenu()
              this.menuActived = defaultMenu.id
              this.defAct = defaultMenu.id
              this.iframeUrl = withVersion(defaultMenu.url)
              this.headTitle = defaultMenu.name
              this.goBackFlag = false
              this.persistPageState(defaultMenu, false)
              return
            }

            const pageState = localStorage.getItem(BACKEND_PAGE_STATE_KEY)
            if (!pageState) {
              return
            }

            try {
              const savedPage = JSON.parse(pageState)
              if (!savedPage || !savedPage.id || !savedPage.url || !savedPage.name) {
                return
              }
              this.menuActived = savedPage.id
              this.defAct = savedPage.id
              this.iframeUrl = withVersion(savedPage.url)
              this.headTitle = savedPage.name
              this.goBackFlag = !!savedPage.goBackFlag
            } catch (e) {
              localStorage.removeItem(BACKEND_PAGE_STATE_KEY)
            }
          },
          persistPageState(item, goBackFlag) {
            if (!item || !item.id || !item.url || !item.name) {
              return
            }
            localStorage.setItem(BACKEND_PAGE_STATE_KEY, JSON.stringify({
              id: item.id,
              url: item.url,
              name: item.name,
              goBackFlag: !!goBackFlag
            }))
          },
          closeLoading(){
            this.timer = null
            this.timer = setTimeout(()=>{
              this.loading = false
            },1000)
          }
        }
      })
    </script>
  </body>
</html>
