<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>员工注册 - 瑞吉外卖管理端</title>
  <link rel="shortcut icon" href="../../favicon.ico">
  <link rel="stylesheet" href="../../plugins/element-ui/index.css" />
  <link rel="stylesheet" href="../../styles/common.css">
  <link rel="stylesheet" href="../../styles/login.css">
  <link rel="stylesheet" href="../../styles/icon/iconfont.css" />
  <style>
    .register-box {
      width: 400px;
      margin: 100px auto;
      padding: 30px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
    }
    .register-form-title {
      text-align: center;
      margin-bottom: 30px;
    }
    .register-form-title h2 {
      margin: 0;
      font-size: 24px;
      color: #333;
    }
    .register-form {
      margin-top: 20px;
    }
    .login-link {
      text-align: center;
      margin-top: 20px;
    }
    .login-link a {
      color: #409EFF;
      text-decoration: none;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="login" id="register-app">
    <div class="register-box">
      <div class="register-form">
        <el-form ref="registerForm" :model="registerForm" :rules="registerRules" label-width="100px">
          <div class="register-form-title">
            <h2>员工注册</h2>
          </div>
          <el-form-item label="用户名" prop="username">
            <el-input v-model="registerForm.username" type="text" placeholder="请输入用户名" maxlength="20"
              prefix-icon="iconfont icon-user" />
          </el-form-item>
          <el-form-item label="密码" prop="password">
            <el-input v-model="registerForm.password" type="password" placeholder="请输入密码，至少6位" maxlength="20"
              prefix-icon="iconfont icon-lock" show-password />
          </el-form-item>
          <el-form-item label="确认密码" prop="confirmPassword">
            <el-input v-model="registerForm.confirmPassword" type="password" placeholder="请再次输入密码" maxlength="20"
              prefix-icon="iconfont icon-lock" show-password />
          </el-form-item>
          <el-form-item label="姓名" prop="name">
            <el-input v-model="registerForm.name" type="text" placeholder="请输入姓名" maxlength="20"
              prefix-icon="iconfont icon-user" />
          </el-form-item>
          <el-form-item label="手机号" prop="phone">
            <el-input v-model="registerForm.phone" type="text" placeholder="请输入手机号" maxlength="20"
              prefix-icon="iconfont icon-phone" />
          </el-form-item>
          <el-form-item label="性别" prop="sex">
            <el-radio-group v-model="registerForm.sex">
              <el-radio label="男">男</el-radio>
              <el-radio label="女">女</el-radio>
            </el-radio-group>
          </el-form-item>
          <el-form-item label="身份证号" prop="idNumber">
            <el-input v-model="registerForm.idNumber" type="text" placeholder="请输入身份证号" maxlength="20"
              prefix-icon="iconfont icon-card" />
          </el-form-item>
          <el-form-item style="width:100%;">
            <el-button :loading="loading" class="register-btn" size="medium" type="primary" style="width:100%;"
              @click.native.prevent="handleRegister">
              <span v-if="!loading">注册</span>
              <span v-else>注册中...</span>
            </el-button>
          </el-form-item>
          <div class="login-link">
            <a href="login.html">已有账号？去登录</a>
          </div>
        </el-form>
      </div>
    </div>
  </div>

  <script src="../../plugins/vue/vue.js"></script>
  <script src="../../plugins/element-ui/index.js"></script>
  <script src="../../plugins/axios/axios.min.js"></script>
  <script src="../../js/request.js"></script>
  <script src="../../js/validate.js"></script>

  <script>
    new Vue({
      el: '#register-app',
      data() {
        return {
          registerForm: {
            username: '',
            password: '',
            confirmPassword: '',
            name: '',
            phone: '',
            sex: '男',
            idNumber: ''
          },
          loading: false
        }
      },
      computed: {
        registerRules() {
          const validateUsername = (rule, value, callback) => {
            if (!value || value.trim().length === 0) {
              callback(new Error('请输入用户名'))
            } else {
              callback()
            }
          }
          const validatePassword = (rule, value, callback) => {
            if (!value || value.length < 6) {
              callback(new Error('密码长度不能少于6位'))
            } else {
              callback()
            }
          }
          const validateConfirmPassword = (rule, value, callback) => {
            if (!value) {
              callback(new Error('请再次输入密码'))
            } else if (value !== this.registerForm.password) {
              callback(new Error('两次输入的密码不一致'))
            } else {
              callback()
            }
          }
          const validateName = (rule, value, callback) => {
            if (!value || value.trim().length === 0) {
              callback(new Error('请输入姓名'))
            } else {
              callback()
            }
          }
          const validatePhone = (rule, value, callback) => {
            if (value && !/^1[3-9]\d{9}$/.test(value)) {
              callback(new Error('请输入有效的手机号'))
            } else {
              callback()
            }
          }
          const validateIdNumber = (rule, value, callback) => {
            if (value && !/(^\d{15}$)|(^\d{18}$)|(^\d{17}(\d|X|x)$)/.test(value)) {
              callback(new Error('请输入有效的身份证号'))
            } else {
              callback()
            }
          }
          return {
            'username': [{ 'validator': validateUsername, 'trigger': 'blur' }],
            'password': [{ 'validator': validatePassword, 'trigger': 'blur' }],
            'confirmPassword': [{ 'validator': validateConfirmPassword, 'trigger': 'blur' }],
            'name': [{ 'validator': validateName, 'trigger': 'blur' }],
            'phone': [{ 'validator': validatePhone, 'trigger': 'blur' }],
            'idNumber': [{ 'validator': validateIdNumber, 'trigger': 'blur' }]
          }
        }
      },
      methods: {
        async handleRegister() {
          this.$refs.registerForm.validate(async (valid) => {
            if (valid) {
              this.loading = true
              try {
                const params = {
                  username: this.registerForm.username,
                  password: this.registerForm.password,
                  name: this.registerForm.name,
                  phone: this.registerForm.phone || null,
                  sex: this.registerForm.sex,
                  idNumber: this.registerForm.idNumber || null
                }
                const response = await $axios.post('/employee/register', params)
                if (response.code === 1) {
                  this.$message.success('注册成功！')
                  setTimeout(() => {
                    window.location.href = 'login.html'
                  }, 1500)
                } else {
                  this.$message.error(response.msg || '注册失败')
                }
              } catch (error) {
                this.$message.error('请求出错：' + error.message)
              } finally {
                this.loading = false
              }
            }
          })
        }
      }
    })
  </script>
</body>

</html>
