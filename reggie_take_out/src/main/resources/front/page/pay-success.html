<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0,user-scalable=no,minimal-ui">
        <title>KT猫后台系统</title>
        <link rel="icon" href="./../images/favico.ico">
        <!--涓嶅悓灞忓箷灏哄鏍瑰瓧浣撹缃?->
        <script src="./../js/base.js"></script>
        <!--element-ui鐨勬牱寮?->
        <link rel="stylesheet" href="../../backend/plugins/element-ui/index.css" />
        <!-- 寮曞叆鏍峰紡  -->
        <link rel="stylesheet" href="../styles/index.css" />
        <!--鏈〉闈㈠唴瀹圭殑鏍峰紡-->
        <link rel="stylesheet" href="./../styles/pay-success.css" />
    </head>
    <body>
        <div id="pay_success" class="app">
            <div class="divHead">
                <div class="divTitle">
                    <i class="el-icon-arrow-left" @click="goBack"></i>
                    KT鐚悗鍙扮郴缁?
                    <img src="./../images/home.png" @click="toMainPage"/>
                </div>
            </div>
            <div class="divContent">
                <img src="./../images/success.png"/>
                <div class="divSuccess">涓嬪崟鎴愬姛</div>
                <div class="divDesc">棰勮{{finishTime}}鍒拌揪</div>
                <div class="divDesc1">鍚庡帹姝ｅ湪鍔犵揣鍒朵綔涓紝璇疯€愬績绛夊緟~</div>
                <div class="btnView" @click="toOrderPage">鏌ョ湅璁㈠崟</div>
            </div>
        </div>
        <!-- 寮€鍙戠幆澧冪増鏈紝鍖呭惈浜嗘湁甯姪鐨勫懡浠よ璀﹀憡 -->
        <script src="../../backend/plugins/vue/vue.js"></script>
        <!-- 寮曞叆缁勪欢搴?-->
        <script src="../../backend/plugins/element-ui/index.js"></script>
        <!-- 寮曞叆axios -->
        <script src="../../backend/plugins/axios/axios.min.js"></script>
        <script src="./../js/request.js"></script>
        <script>
        new Vue({
            el:"#pay_success",
            data(){
                return {
                    finishTime:''
                }
            },
            computed:{},
            created(){
                this.getFinishTime()
            },
            mounted(){},
            methods:{
                goBack(){
                    window.requestAnimationFrame(()=>{
                        window.location.replace('/front/index.html')
                    })   
                },
                toOrderPage(){
                    window.requestAnimationFrame(()=>{
                        window.location.replace('/front/page/order.html')
                    })  
                },
                toMainPage(){
                    window.requestAnimationFrame(()=>{
                        window.location.replace('/front/index.html')
                    })  
                },
                //鑾峰彇閫佽揪鏃堕棿
                getFinishTime(){
                    let now = new Date()
                    let hour = now.getHours() +1
                    let minute = now.getMinutes()
                    if(hour.toString().length <2){
                        hour = '0' + hour
                    }
                    if(minute.toString().length <2){
                        minute = '0' + minute
                    }
                    this.finishTime = hour + ':' + minute
                },
                
            }
        })
        </script>
    </body>
</html>
